<style>
  @font-face {
    font-family: 'Sarabun';
    src: local('Sarabun');
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    background: #0e1520;
    font-family: 'Sarabun', 'Noto Sans Thai', -apple-system, sans-serif;
    color: #e7ebf1;
    -webkit-tap-highlight-color: transparent;
  }
  #app {
    max-width: 430px;
    margin: 0 auto;
    min-height: 100vh;
    background:
      radial-gradient(900px 500px at 15% -10%, rgba(90,120,180,0.16), transparent 60%),
      radial-gradient(700px 500px at 100% 10%, rgba(180,150,90,0.10), transparent 55%),
      #0e1520;
    display: flex;
    flex-direction: column;
    position: relative;
  }
  .header {
    background: linear-gradient(180deg, rgba(255,255,255,0.04), transparent 70%);
    color: #f4f2ea;
    padding: 22px 20px 18px;
    position: sticky;
    top: 0;
    z-index: 20;
    border-bottom: 1px solid rgba(255,255,255,0.06);
    backdrop-filter: blur(14px);
  }
  .header-title {
    font-family: Georgia, 'Times New Roman', serif;
    font-size: 21px;
    font-weight: 700;
    letter-spacing: 0.3px;
  }
  .header-sub {
    font-size: 12px;
    color: #8b96a8;
    margin-top: 3px;
    font-variant: small-caps;
    letter-spacing: 0.5px;
  }
  .header-top {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .header-logo {
    width: 48px;
    height: auto;
    flex-shrink: 0;
    filter: drop-shadow(0 3px 8px rgba(0,0,0,0.4));
  }
  .header-actions {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-top: 10px;
  }
  .header-actions button {
    flex: 1;
    min-width: 0;
    background: rgba(255,255,255,0.06);
    color: #eef1f5;
    border: 1px solid rgba(255,255,255,0.09);
    padding: 8px 6px;
    border-radius: 8px;
    font-size: 12.5px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 5px;
    cursor: pointer;
  }
  .header-actions button.full-row { flex-basis: 100%; }
  .header-actions button:active { transform: scale(0.97); }
  .header-actions .ti { font-size: 15px; }

  .search-bar {
    margin: 12px 0 0;
  }
  .search-bar input {
    width: 100%;
    padding: 9px 12px;
    border-radius: 8px;
    border: 1px solid rgba(255,255,255,0.09);
    background: rgba(255,255,255,0.05);
    color: #f2ede0;
    font-size: 14px;
  }
  .search-bar input::placeholder { color: #6d7889; }

  .tabs {
    display: flex;
    gap: 6px;
    padding: 10px 14px;
    background: transparent;
    position: sticky;
    top: 136px;
    z-index: 19;
    overflow-x: auto;
    border-bottom: 1px solid rgba(255,255,255,0.06);
  }
  .tab {
    flex: none;
    padding: 7px 12px;
    border-radius: 999px;
    font-size: 13px;
    font-weight: 600;
    border: 1px solid rgba(255,255,255,0.08);
    white-space: nowrap;
    cursor: pointer;
    color: #a7b0bd;
    background: rgba(255,255,255,0.05);
  }
  .tab.active-all { background: #eef1f5; color: #1a2330; border-color: transparent; }
  .tab.active-drug { background: #d98a4a; color: #241304; border-color: transparent; }
  .tab.active-theft { background: #5fae76; color: #072711; border-color: transparent; }
  .tab.active-warrant { background: #e07070; color: #2b0808; border-color: transparent; }
  .tab.active-suspect { background: #9b8bd9; color: #17102e; border-color: transparent; }

  .count-row {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 8px;
    padding: 12px 14px 4px;
  }
  .count-card {
    flex: 1;
    background: rgba(255,255,255,0.045);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 12px;
    padding: 10px 8px;
    text-align: center;
  }
  .count-num { font-size: 19px; font-weight: 700; font-family: Georgia, serif; color: #f0f2f5; }
  .count-label { font-size: 10.5px; color: #8b96a8; margin-top: 2px; }

  .list {
    flex: 1;
    padding: 10px 14px 90px;
  }
  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: #6d7889;
  }
  .empty-state .ti { font-size: 40px; opacity: 0.5; }
  .empty-state p { margin-top: 10px; font-size: 14px; }

  .card {
    background: rgba(255,255,255,0.045);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 14px;
    margin-bottom: 10px;
    overflow: hidden;
    position: relative;
    box-shadow: 0 4px 14px rgba(0,0,0,0.25);
  }
  .card-tab {
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 4px;
  }
  .tab-drug { background: #d98a4a; }
  .tab-theft { background: #5fae76; }
  .tab-warrant { background: #e07070; }
  .tab-suspect { background: #9b8bd9; }

  .card-body { padding: 12px 14px 12px 18px; }
  .card-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 8px;
  }
  .card-name { font-size: 15.5px; font-weight: 700; color: #f0f2f5; }
  .card-meta { font-size: 12px; color: #8b96a8; margin-top: 2px; font-family: 'Courier New', monospace; }
  .card-photo-row { display: flex; gap: 10px; }
  .card-thumb {
    width: 52px;
    height: 52px;
    border-radius: 8px;
    object-fit: cover;
    flex-shrink: 0;
    border: 1px solid rgba(255,255,255,0.12);
  }
  .photo-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 8px;
  }
  .photo-slot {
    position: relative;
    border: 1.5px dashed rgba(255,255,255,0.16);
    border-radius: 12px;
    background: rgba(255,255,255,0.04);
    overflow: hidden;
    cursor: pointer;
    aspect-ratio: 1 / 1;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .photo-slot img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }
  .photo-slot-label {
    position: absolute;
    left: 0; right: 0; bottom: 0;
    background: rgba(10,15,22,0.72);
    color: #f2ede0;
    font-size: 11px;
    text-align: center;
    padding: 3px 0;
    pointer-events: none;
  }
  .photo-slot-x {
    position: absolute;
    top: 4px; right: 4px;
    width: 22px; height: 22px;
    border-radius: 50%;
    background: rgba(10,15,22,0.75);
    color: #f2ede0;
    border: none;
    font-size: 13px;
    line-height: 22px;
    text-align: center;
    padding: 0;
    cursor: pointer;
    z-index: 2;
  }
  .photo-placeholder {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    color: #6d7889;
    font-size: 11px;
    text-align: center;
  }
  .photo-placeholder .ti { font-size: 22px; }
  .photo-slot-single {
    aspect-ratio: 16 / 9;
    width: 100%;
  }
  .card-location-thumb {
    width: 100%;
    aspect-ratio: 16 / 9;
    object-fit: cover;
    border-radius: 8px;
    margin-top: 8px;
    border: 1px solid rgba(255,255,255,0.1);
    display: block;
  }
  .badge {
    font-size: 10.5px;
    font-weight: 700;
    padding: 3px 8px;
    border-radius: 6px;
    white-space: nowrap;
  }
  .badge-drug { background: rgba(217,138,74,0.18); color: #e8a56b; }
  .badge-theft { background: rgba(95,174,118,0.18); color: #7dc794; }
  .badge-warrant { background: rgba(224,112,112,0.18); color: #ec9494; }
  .badge-suspect { background: rgba(155,139,217,0.18); color: #b8abe8; }

  .card-detail {
    font-size: 13px;
    color: #b7bfca;
    margin-top: 8px;
    line-height: 1.5;
  }
  .card-status {
    margin-top: 8px;
    font-size: 11.5px;
    display: inline-block;
    padding: 2px 8px;
    border-radius: 6px;
    background: rgba(255,255,255,0.07);
    color: #c7cedb;
    font-weight: 600;
  }
  .card-actions {
    display: flex;
    gap: 8px;
    margin-top: 10px;
    border-top: 1px solid rgba(255,255,255,0.07);
    padding-top: 8px;
  }
  .card-actions button {
    flex: 1;
    font-size: 12.5px;
    padding: 6px;
    border-radius: 8px;
    border: 1px solid rgba(255,255,255,0.1);
    background: rgba(255,255,255,0.05);
    color: #dbe1ea;
    cursor: pointer;
  }
  .card-actions button:active { transform: scale(0.97); }

  .fab {
    position: absolute;
    right: 18px;
    bottom: 22px;
    width: 54px;
    height: 54px;
    border-radius: 50%;
    background: linear-gradient(145deg, #d4af6a, #b8935f);
    color: #201505;
    border: none;
    font-size: 26px;
    box-shadow: 0 6px 18px rgba(212,175,106,0.35);
    cursor: pointer;
    z-index: 25;
  }
  .fab:active { transform: scale(0.95); }

  .sheet-overlay {
    position: absolute;
    inset: 0;
    background: rgba(6,9,14,0.6);
    z-index: 30;
    display: none;
    align-items: flex-end;
    backdrop-filter: blur(3px);
  }
  .sheet-overlay.open { display: flex; }
  .sheet {
    background: #161f2b;
    width: 100%;
    max-height: 88vh;
    border-radius: 20px 20px 0 0;
    padding: 16px 18px 22px;
    overflow-y: auto;
    border-top: 1px solid rgba(255,255,255,0.08);
    box-shadow: 0 -10px 30px rgba(0,0,0,0.4);
  }
  .sheet-title {
    font-family: Georgia, serif;
    font-size: 17px;
    font-weight: 700;
    margin-bottom: 14px;
    color: #f0f2f5;
  }
  .field { margin-bottom: 12px; }
  .field label {
    display: block;
    font-size: 12.5px;
    font-weight: 600;
    color: #9aa5b4;
    margin-bottom: 5px;
  }
  .field input, .field select, .field textarea {
    width: 100%;
    padding: 9px 10px;
    border-radius: 8px;
    border: 1px solid rgba(255,255,255,0.1);
    background: rgba(255,255,255,0.05);
    font-size: 14px;
    font-family: inherit;
    color: #eef1f5;
  }
  .field input::placeholder, .field textarea::placeholder { color: #5f6a7a; }
  .field textarea { resize: vertical; min-height: 60px; }
  .row2 { display: flex; gap: 10px; }
  .row2 > .field { flex: 1; }

  .sheet-actions {
    display: flex;
    gap: 10px;
    margin-top: 16px;
  }
  .btn-save {
    flex: 2;
    background: linear-gradient(145deg, #d4af6a, #b8935f);
    color: #201505;
    border: none;
    padding: 11px;
    border-radius: 10px;
    font-size: 14.5px;
    font-weight: 700;
    cursor: pointer;
  }
  .btn-cancel {
    flex: 1;
    background: rgba(255,255,255,0.07);
    color: #dbe1ea;
    border: 1px solid rgba(255,255,255,0.1);
    padding: 11px;
    border-radius: 10px;
    font-size: 14.5px;
    cursor: pointer;
  }
  .btn-danger {
    background: rgba(224,112,112,0.14);
    color: #ec9494;
    border: 1px solid rgba(224,112,112,0.25);
    padding: 11px;
    border-radius: 10px;
    font-size: 13.5px;
    font-weight: 600;
    cursor: pointer;
    width: 100%;
    margin-top: 10px;
  }
  .toast {
    position: absolute;
    bottom: 90px;
    left: 50%;
    transform: translateX(-50%);
    background: #eef1f5;
    color: #1a2330;
    padding: 9px 18px;
    border-radius: 20px;
    font-size: 13px;
    font-weight: 600;
    z-index: 40;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.25s;
    box-shadow: 0 6px 16px rgba(0,0,0,0.3);
  }
  .toast.show { opacity: 1; }

  #printArea { display: none; }
  @media print {
    body * { visibility: hidden; }
    #printArea, #printArea * { visibility: visible; }
    #printArea {
      display: block;
      position: absolute;
      left: 0; top: 0;
      width: 100%;
      background: #fff;
      color: #111;
      font-family: 'Sarabun', 'Noto Sans Thai', -apple-system, sans-serif;
    }
    .print-title {
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 2px;
    }
    .print-subtitle {
      font-size: 11px;
      color: #555;
      margin-bottom: 16px;
    }
    .print-category-header {
      font-size: 15px;
      font-weight: 700;
      margin: 18px 0 8px;
      padding-bottom: 4px;
      border-bottom: 2px solid #333;
    }
    .print-record {
      border: 1px solid #ccc;
      border-radius: 6px;
      padding: 10px 12px;
      margin-bottom: 10px;
      break-inside: avoid;
    }
    .print-record-name {
      font-size: 14px;
      font-weight: 700;
      margin-bottom: 4px;
    }
    .print-record-row {
      font-size: 11.5px;
      color: #222;
      margin-bottom: 2px;
    }
    .print-record-label {
      font-weight: 600;
      color: #555;
    }
    .print-photos {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 8px;
    }
    .print-photos figure {
      margin: 0;
      text-align: center;
    }
    .print-photos img {
      width: 90px;
      height: 90px;
      object-fit: cover;
      border: 1px solid #bbb;
      border-radius: 4px;
      display: block;
    }
    .print-photos figcaption {
      font-size: 9px;
      color: #666;
      margin-top: 2px;
    }
  }
</style>
</head>

        <label>รูปภาพ 4 ด้าน</label>
        <div class="photo-grid" id="photoGrid">
          <div class="photo-slot" data-slot="front">
            <div class="photo-placeholder"><i class="ti ti-camera" aria-hidden="true"></i><span>ด้านหน้า</span></div>
          </div>
          <div class="photo-slot" data-slot="left">
            <div class="photo-placeholder"><i class="ti ti-camera" aria-hidden="true"></i><span>ด้านข้างซ้าย</span></div>
          </div>
          <div class="photo-slot" data-slot="right">
            <div class="photo-placeholder"><i class="ti ti-camera" aria-hidden="true"></i><span>ด้านข้างขวา</span></div>
          </div>
          <div class="photo-slot" data-slot="back">
            <div class="photo-placeholder"><i class="ti ti-camera" aria-hidden="true"></i><span>ด้านหลัง</span></div>

        <div class="field">
          <label>เลขบัตรประชาชน</label>
          <input type="text" id="f_idcard" placeholder="13 หลัก" inputmode="numeric" maxlength="17">

      <div class="row2">
        <div class="field">
          <label>อายุ</label>
          <input type="number" id="f_age" placeholder="อายุ (ปี)">
        </div>
        <div class="field">
          <label>ประเภทคดี *</label>
          <select id="f_category">
            <option value="ยาเสพติด">คดียาเสพติด</option>
            <option value="ลักทรัพย์">คดีลักทรัพย์</option>
            <option value="หมายจับ">หมายจับ</option>
            <option value="บุคคลต้องสงสัย">บุคคลต้องสงสัย</option>
          </select>
        </div>
      </div>
      <div class="row2">
        <div class="field">
          <label>เลขที่คดี / เลขหมาย</label>
          <input type="text" id="f_caseNumber" placeholder="เช่น คดีที่ 123/2569">
        </div>
        <div class="field">
          <label>วันที่</label>
          <input type="date" id="f_date">
        </div>
      </div>
      <div class="field">
        <label>สถานที่เกิดเหตุ / จับกุม</label>
        <input type="text" id="f_location" placeholder="เช่น เขตบางนา กรุงเทพฯ">
      </div>
      <div class="field">
        <label>ภาพสถานที่จับกุม</label>
        <div class="photo-slot photo-slot-single" id="locationPhotoSlot">
          <div class="photo-placeholder"><i class="ti ti-camera" aria-hidden="true"></i><span>แตะเพื่อเพิ่มภาพสถานที่</span></div>
        </div>
      </div>
      <div class="field">
        <label>สถานะ</label>
        <select id="f_status">
          <option>อยู่ระหว่างดำเนินคดี</option>
          <option>จับกุมแล้ว</option>
          <option>ยังไม่จับกุม (ตามหมาย)</option>
          <option>ปิดคดี / สิ้นสุด</option>
        </select>
      </div>
      <div class="field">
        <label>รายละเอียดคดี</label>
        <textarea id="f_details" placeholder="รายละเอียดโดยย่อ"></textarea>
      </div>
      <div class="field">
        <label>หมายเหตุ</label>
        <textarea id="f_notes" placeholder="หมายเหตุเพิ่มเติม"></textarea>
      </div>

      <div class="sheet-actions">
        <button class="btn-cancel" id="btnCancel">ยกเลิก</button>
        <button class="btn-save" id="btnSave">บันทึก</button>
      </div>
      <button class="btn-danger" id="btnDelete" style="display:none;">ลบข้อมูลนี้</button>
    </div>
  </div>

  <div class="toast" id="toast"></div>
  <div id="printArea"></div>
</div>

<script>
let records = [];
let currentFilter = 'all';
let currentSearch = '';
let editingId = null;
let currentPhotos = { front: null, left: null, right: null, back: null };
let currentLocationPhoto = null;
let activeSlot = null;
const slotLabels = { front: 'ด้านหน้า', left: 'ด้านข้างซ้าย', right: 'ด้านข้างขวา', back: 'ด้านหลัง' };

function uid() {
  return 'r' + Date.now() + Math.random().toString(36).slice(2, 7);
}

function resizeImageFile(file, maxDim, quality) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = (e) => {
      const img = new Image();
      img.onload = () => {
        let w = img.width;
        let h = img.height;
        if (w > h && w > maxDim) { h = Math.round(h * maxDim / w); w = maxDim; }
        else if (h > maxDim) { w = Math.round(w * maxDim / h); h = maxDim; }
        const canvas = document.createElement('canvas');
        canvas.width = w;
        canvas.height = h;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, w, h);
        resolve(canvas.toDataURL('image/jpeg', quality));
      };
      img.onerror = reject;
      img.src = e.target.result;
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

function catClass(cat) {
  if (cat === 'ยาเสพติด') return 'drug';
  if (cat === 'ลักทรัพย์') return 'theft';
  if (cat === 'บุคคลต้องสงสัย') return 'suspect';
  return 'warrant';
}

async function loadRecords() {
  try {
    const raw = localStorage.getItem('case-records-v1');
    records = raw ? JSON.parse(raw) : [];
  } catch (e) {
    records = [];
  }
  render();
}

async function saveRecords() {
  try {
    localStorage.setItem('case-records-v1', JSON.stringify(records));
  } catch (e) {
    showToast('บันทึกไม่สำเร็จ ลองใหม่อีกครั้ง');
  }
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 1800);
}

function render() {
  renderCounts();
  renderList();
}

function renderCounts() {
  const counts = { 'ยาเสพติด': 0, 'ลักทรัพย์': 0, 'หมายจับ': 0, 'บุคคลต้องสงสัย': 0 };
  records.forEach(r => { if (counts[r.category] !== undefined) counts[r.category]++; });
  const row = document.getElementById('countRow');
  row.innerHTML = `
    <div class="count-card"><div class="count-num">${counts['ยาเสพติด']}</div><div class="count-label">ยาเสพติด</div></div>
    <div class="count-card"><div class="count-num">${counts['ลักทรัพย์']}</div><div class="count-label">ลักทรัพย์</div></div>
    <div class="count-card"><div class="count-num">${counts['หมายจับ']}</div><div class="count-label">หมายจับ</div></div>
    <div class="count-card"><div class="count-num">${counts['บุคคลต้องสงสัย']}</div><div class="count-label">บุคคลต้องสงสัย</div></div>
  `;
}

function renderList() {
  const list = document.getElementById('list');
  let filtered = records;
  if (currentFilter !== 'all') {
    filtered = filtered.filter(r => r.category === currentFilter);
  }
  if (currentSearch.trim()) {
    const q = currentSearch.trim().toLowerCase();
    filtered = filtered.filter(r =>
      (r.name || '').toLowerCase().includes(q) ||
      (r.caseNumber || '').toLowerCase().includes(q) ||
      (r.location || '').toLowerCase().includes(q)
    );
  }
  filtered = filtered.slice().sort((a, b) => (b.date || '').localeCompare(a.date || ''));

  if (filtered.length === 0) {
    list.innerHTML = `<div class="empty-state"><i class="ti ti-folder-off"></i><p>ยังไม่มีข้อมูลในหมวดนี้<br>กดปุ่ม + เพื่อเพิ่มรายการ</p></div>`;
    return;
  }

  list.innerHTML = filtered.map(r => {
    const cc = catClass(r.category);
    return `
    <div class="card" data-id="${r.id}">
      <div class="card-tab tab-${cc}"></div>
      <div class="card-body">
        <div class="card-top">
          <div class="card-photo-row">
            ${(() => {
              const thumb = (r.photos && (r.photos.front || r.photos.left || r.photos.right || r.photos.back)) || r.photo || '';
              return thumb ? `<img src="${thumb}" class="card-thumb" alt="รูปภาพ">` : '';
            })()}
            <div>
              <div class="card-name">${escapeHtml(r.name)}${r.nickname ? ` <span style="font-weight:400;color:#8b96a8;">(${escapeHtml(r.nickname)})</span>` : ''}</div>
              <div class="card-meta">${r.idCard ? escapeHtml(r.idCard) + ' · ' : ''}${r.caseNumber ? escapeHtml(r.caseNumber) + ' · ' : ''}${r.date || '-'}</div>
            </div>
          </div>
          <div class="badge badge-${cc}">${r.category}</div>
        </div>
        ${r.details ? `<div class="card-detail">${escapeHtml(r.details)}</div>` : ''}
        ${r.locationPhoto ? `<img src="${r.locationPhoto}" class="card-location-thumb" alt="ภาพสถานที่จับกุม">` : ''}
        <div class="card-status">${r.status || '-'}</div>
        <div class="card-actions">
          <button class="btn-edit" data-id="${r.id}">แก้ไข</button>
          <button class="btn-view" data-id="${r.id}">ดูรายละเอียด</button>
        </div>
      </div>
    </div>
    `;
  }).join('');

  list.querySelectorAll('.btn-edit').forEach(b => b.onclick = () => openEdit(b.dataset.id));
  list.querySelectorAll('.btn-view').forEach(b => b.onclick = () => openEdit(b.dataset.id));
}

function escapeHtml(s) {
  if (!s) return '';
  return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

document.getElementById('tabs').addEventListener('click', (e) => {
  const tab = e.target.closest('.tab');
  if (!tab) return;
  document.querySelectorAll('.tab').forEach(t => t.className = 'tab');
  currentFilter = tab.dataset.cat;
  if (currentFilter === 'all') tab.classList.add('active-all');
  else if (currentFilter === 'ยาเสพติด') tab.classList.add('active-drug');
  else if (currentFilter === 'ลักทรัพย์') tab.classList.add('active-theft');
  else if (currentFilter === 'หมายจับ') tab.classList.add('active-warrant');
  else tab.classList.add('active-suspect');
  renderList();
});

document.getElementById('searchInput').addEventListener('input', (e) => {
  currentSearch = e.target.value;
  renderList();
});

function openAdd() {
  editingId = null;
  currentPhotos = { front: null, left: null, right: null, back: null };
  currentLocationPhoto = null;
  renderPhotoSlots();
  renderLocationPhoto();
  document.getElementById('sheetTitle').textContent = 'เพิ่มข้อมูลคดี';
  document.getElementById('btnDelete').style.display = 'none';
  ['f_name','f_nickname','f_idcard','f_age','f_caseNumber','f_date','f_location','f_details','f_notes'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('f_category').value = currentFilter !== 'all' ? currentFilter : 'ยาเสพติด';
  document.getElementById('f_status').value = 'อยู่ระหว่างดำเนินคดี';
  document.getElementById('sheetOverlay').classList.add('open');
}

function openEdit(id) {
  const r = records.find(x => x.id === id);
  if (!r) return;
  editingId = id;
  if (r.photos) {
    currentPhotos = { front: r.photos.front || null, left: r.photos.left || null, right: r.photos.right || null, back: r.photos.back || null };
  } else {
    // backward compatibility with older single-photo records
    currentPhotos = { front: r.photo || null, left: null, right: null, back: null };
  }
  renderPhotoSlots();
  currentLocationPhoto = r.locationPhoto || null;
  renderLocationPhoto();
  document.getElementById('sheetTitle').textContent = 'แก้ไขข้อมูลคดี';
  document.getElementById('btnDelete').style.display = 'block';
  document.getElementById('f_name').value = r.name || '';
  document.getElementById('f_nickname').value = r.nickname || '';
  document.getElementById('f_idcard').value = r.idCard || '';
  document.getElementById('f_age').value = r.age || '';
  document.getElementById('f_category').value = r.category || 'ยาเสพติด';
  document.getElementById('f_caseNumber').value = r.caseNumber || '';
  document.getElementById('f_date').value = r.date || '';
  document.getElementById('f_location').value = r.location || '';
  document.getElementById('f_status').value = r.status || 'อยู่ระหว่างดำเนินคดี';
  document.getElementById('f_details').value = r.details || '';
  document.getElementById('f_notes').value = r.notes || '';
  document.getElementById('sheetOverlay').classList.add('open');
}

function closeSheet() {
  document.getElementById('sheetOverlay').classList.remove('open');
}

document.getElementById('fabAdd').onclick = openAdd;
document.getElementById('btnCancel').onclick = closeSheet;
document.getElementById('sheetOverlay').addEventListener('click', (e) => {
  if (e.target.id === 'sheetOverlay') closeSheet();
});

document.getElementById('photoGrid').addEventListener('click', (e) => {
  const removeBtn = e.target.closest('.photo-slot-x');
  if (removeBtn) {
    const slot = removeBtn.closest('.photo-slot').dataset.slot;
    currentPhotos[slot] = null;
    renderPhotoSlots();
    return;
  }
  const slotEl = e.target.closest('.photo-slot');
  if (slotEl) {
    activeSlot = slotEl.dataset.slot;
    document.getElementById('f_photo').click();
  }
});

document.getElementById('locationPhotoSlot').addEventListener('click', (e) => {
  const removeBtn = e.target.closest('.photo-slot-x');
  if (removeBtn) {
    currentLocationPhoto = null;
    renderLocationPhoto();
    return;
  }
  activeSlot = 'location';
  document.getElementById('f_photo').click();
});

document.getElementById('f_photo').addEventListener('change', async (e) => {
  const file = e.target.files[0];
  if (!file || !activeSlot) return;
  try {
    const dataUrl = await resizeImageFile(file, 640, 0.72);
    if (activeSlot === 'location') {
      currentLocationPhoto = dataUrl;
      renderLocationPhoto();
    } else {
      currentPhotos[activeSlot] = dataUrl;
      renderPhotoSlots();
    }
  } catch (err) {
    showToast('ไม่สามารถโหลดรูปภาพนี้ได้');
  }
  e.target.value = '';
});

function renderPhotoSlots() {
  const grid = document.getElementById('photoGrid');
  grid.querySelectorAll('.photo-slot').forEach(slotEl => {
    const slot = slotEl.dataset.slot;
    const dataUrl = currentPhotos[slot];
    if (dataUrl) {
      slotEl.innerHTML = `
        <img src="${dataUrl}" alt="${slotLabels[slot]}">
        <button type="button" class="photo-slot-x" aria-label="ลบ">✕</button>
        <div class="photo-slot-label">${slotLabels[slot]}</div>
      `;
    } else {
      slotEl.innerHTML = `
        <div class="photo-placeholder"><i class="ti ti-camera" aria-hidden="true"></i><span>${slotLabels[slot]}</span></div>
      `;
    }
  });
}

function renderLocationPhoto() {
  const slotEl = document.getElementById('locationPhotoSlot');
  if (currentLocationPhoto) {
    slotEl.innerHTML = `
      <img src="${currentLocationPhoto}" alt="ภาพสถานที่จับกุม">
      <button type="button" class="photo-slot-x" aria-label="ลบ">✕</button>
      <div class="photo-slot-label">ภาพสถานที่จับกุม</div>
    `;
  } else {
    slotEl.innerHTML = `
      <div class="photo-placeholder"><i class="ti ti-camera" aria-hidden="true"></i><span>แตะเพื่อเพิ่มภาพสถานที่</span></div>
    `;
  }
}

document.getElementById('btnSave').onclick = async () => {
  const name = document.getElementById('f_name').value.trim();
  if (!name) {
    showToast('กรุณากรอกชื่อ-นามสกุล');
    return;
  }
  const data = {
    name,
    nickname: document.getElementById('f_nickname').value.trim(),
    idCard: document.getElementById('f_idcard').value.trim(),
    photos: { ...currentPhotos },
    age: document.getElementById('f_age').value.trim(),
    category: document.getElementById('f_category').value,
    caseNumber: document.getElementById('f_caseNumber').value.trim(),
    date: document.getElementById('f_date').value,
    location: document.getElementById('f_location').value.trim(),
    locationPhoto: currentLocationPhoto,
    status: document.getElementById('f_status').value,
    details: document.getElementById('f_details').value.trim(),
    notes: document.getElementById('f_notes').value.trim(),
  };
  if (editingId) {
    const idx = records.findIndex(r => r.id === editingId);
    if (idx !== -1) records[idx] = { ...records[idx], ...data };
    showToast('บันทึกการแก้ไขแล้ว');
  } else {
    data.id = uid();
    records.push(data);
    showToast('เพิ่มข้อมูลแล้ว');
  }
  await saveRecords();
  closeSheet();
  render();
};

document.getElementById('btnDelete').onclick = async () => {
  if (!editingId) return;
  if (!confirm('ยืนยันการลบข้อมูลนี้?')) return;
  records = records.filter(r => r.id !== editingId);
  await saveRecords();
  closeSheet();
  render();
  showToast('ลบข้อมูลแล้ว');
};

document.getElementById('btnExportPdf').onclick = () => {
  if (records.length === 0) {
    showToast('ยังไม่มีข้อมูลให้ส่งออก');
    return;
  }
  const categories = ['ยาเสพติด', 'ลักทรัพย์', 'หมายจับ', 'บุคคลต้องสงสัย'];
  const now = new Date();
  const genDate = now.toLocaleDateString('th-TH', { year: 'numeric', month: 'long', day: 'numeric' });

  function photoFigure(url, label) {
    if (!url) return '';
    return `<figure><img src="${url}"><figcaption>${label}</figcaption></figure>`;
  }

  function recordBlock(r) {
    const photos = r.photos || {};
    const photosHtml = [
      photoFigure(photos.front, 'ด้านหน้า'),
      photoFigure(photos.left, 'ด้านข้างซ้าย'),
      photoFigure(photos.right, 'ด้านข้างขวา'),
      photoFigure(photos.back, 'ด้านหลัง'),
      photoFigure(r.locationPhoto, 'สถานที่จับกุม'),
    ].join('');
    return `
      <div class="print-record">
        <div class="print-record-name">${escapeHtml(r.name)}${r.nickname ? ' (' + escapeHtml(r.nickname) + ')' : ''}</div>
        <div class="print-record-row"><span class="print-record-label">เลขบัตรประชาชน:</span> ${escapeHtml(r.idCard || '-')} &nbsp; <span class="print-record-label">อายุ:</span> ${escapeHtml(r.age || '-')}</div>
        <div class="print-record-row"><span class="print-record-label">เลขที่คดี/หมาย:</span> ${escapeHtml(r.caseNumber || '-')} &nbsp; <span class="print-record-label">วันที่:</span> ${escapeHtml(r.date || '-')}</div>
        <div class="print-record-row"><span class="print-record-label">สถานที่:</span> ${escapeHtml(r.location || '-')}</div>
        <div class="print-record-row"><span class="print-record-label">สถานะ:</span> ${escapeHtml(r.status || '-')}</div>
        ${r.details ? `<div class="print-record-row"><span class="print-record-label">รายละเอียด:</span> ${escapeHtml(r.details)}</div>` : ''}
        ${r.notes ? `<div class="print-record-row"><span class="print-record-label">หมายเหตุ:</span> ${escapeHtml(r.notes)}</div>` : ''}
        ${photosHtml ? `<div class="print-photos">${photosHtml}</div>` : ''}
      </div>
    `;
  }

  let html = `
    <div class="print-title">ทะเบียนข้อมูลคดี</div>
    <div class="print-subtitle">พิมพ์เมื่อ ${genDate} · ทั้งหมด ${records.length} รายการ</div>
  `;
  categories.forEach(cat => {
    const items = records.filter(r => r.category === cat);
    if (items.length === 0) return;
    html += `<div class="print-category-header">${cat} (${items.length} รายการ)</div>`;
    html += items.map(recordBlock).join('');
  });

  document.getElementById('printArea').innerHTML = html;
  window.print();
};

document.getElementById('btnExport').onclick = () => {
  if (records.length === 0) {
    showToast('ยังไม่มีข้อมูลให้ส่งออก');
    return;
  }
  const rows = records.map(r => ({
    'ชื่อ-นามสกุล': r.name || '',
    'ชื่อเล่น': r.nickname || '',
    'เลขบัตรประชาชน': r.idCard || '',
    'อายุ': r.age || '',
    'ประเภทคดี': r.category || '',
    'เลขที่คดี / เลขหมาย': r.caseNumber || '',
    'วันที่': r.date || '',
    'สถานที่': r.location || '',
    'สถานะ': r.status || '',
    'รายละเอียดคดี': r.details || '',
    'หมายเหตุ': r.notes || '',
  }));
  const ws = XLSX.utils.json_to_sheet(rows);
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, 'ทะเบียนคดี');
  const today = new Date().toISOString().slice(0, 10);
  XLSX.writeFile(wb, `ทะเบียนคดี_${today}.xlsx`);
  showToast('ส่งออกไฟล์ Excel แล้ว');
};

document.getElementById('btnImportTrigger').onclick = () => {
  document.getElementById('fileImport').click();
};

document.getElementById('fileImport').addEventListener('change', (e) => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = async (evt) => {
    try {
      const data = new Uint8Array(evt.target.result);
      const wb = XLSX.read(data, { type: 'array', cellDates: true });
      const sheet = wb.Sheets[wb.SheetNames[0]];
      const rows = XLSX.utils.sheet_to_json(sheet, { defval: '' });
      let imported = 0;
      rows.forEach(row => {
        const name = String(row['ชื่อ-นามสกุล'] || '').trim();
        if (!name) return;
        let dateVal = row['วันที่'];
        if (dateVal instanceof Date) {
          dateVal = dateVal.toISOString().slice(0, 10);
        } else {
          dateVal = String(dateVal || '');
        }
        const cat = String(row['ประเภทคดี'] || '').trim();
        records.push({
          id: uid(),
          name,
          nickname: String(row['ชื่อเล่น'] || ''),
          idCard: String(row['เลขบัตรประชาชน'] || ''),
          age: String(row['อายุ'] || ''),
          category: ['ยาเสพติด', 'ลักทรัพย์', 'หมายจับ', 'บุคคลต้องสงสัย'].includes(cat) ? cat : 'บุคคลต้องสงสัย',
          caseNumber: String(row['เลขที่คดี / เลขหมาย'] || ''),
          date: dateVal,
          location: String(row['สถานที่'] || ''),
          status: String(row['สถานะ'] || 'อยู่ระหว่างดำเนินคดี'),
          details: String(row['รายละเอียดคดี'] || ''),
          notes: String(row['หมายเหตุ'] || ''),
        });
        imported++;
      });
      await saveRecords();
      render();
      showToast(`นำเข้าข้อมูล ${imported} รายการแล้ว`);
    } catch (err) {
      showToast('ไม่สามารถอ่านไฟล์นี้ได้ ตรวจสอบรูปแบบไฟล์');
    }
    e.target.value = '';
  };
  reader.readAsArrayBuffer(file);
});

loadRecords();
</script>
